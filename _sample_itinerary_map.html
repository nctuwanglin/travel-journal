function chibi(x,y,sc,opt){ // 手繪風 Q 版棒球小子(致敬實況野球的圓頭比例,原創角色)

  // 手

  g+='<path d="M-3,-5 Q0,-2 3,-5" stroke="'+INK+'" stroke-width="1.8" fill="none" stroke-linecap="round"/>';

  }
  return g+'</g>';

/* ============ DAY 面板 ============ */
function panel(p,x,y,w,h,rot){
  var g='<g transform="rotate('+rot+' '+(x+w/2)+' '+(y+h/2)+')">';
  g+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="12" fill="#fbf6e8" stroke="#b8a887" stroke-width="2"/>';
  g+='<rect x="'+(x+12)+'" y="'+(y+11)+'" width="58" height="21" rx="10" fill="'+dc(p.d)+'"/>';
  g+='<text x="'+(x+41)+'" y="'+(y+26)+'" font-size="12.5" font-weight="900" fill="#fffdf7" text-anchor="middle">DAY '+p.d+'</text>';
  g+=txt(x+80,y+27,p.date+"  "+p.note,13.5,INK,"start",900);
  var yy=y+48;
  p.rows.forEach(function(r){
    if(!r[1])return;
    if(r[0]){
      g+='<circle cx="'+(x+19)+'" cy="'+(yy-4)+'" r="2.2" fill="'+dc(p.d)+'"/>';
      g+=txt(x+28,yy,r[0]+"：",12,SOFT,"start",900);
      g+=txt(x+28+(r[0].length*12)+14,yy,r[1],12,INK,"start",700);
    }else{
      g+=txt(x+28,yy,r[1],12.5,INK,"start",900);
    }
    yy+=21;
  });
  return g+'</g>';
}
