<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行程集錦 — 旅遊回憶 & 攻略</title>
<meta name="description" content="收藏走過的旅程,也能分享給朋友的攻略牆。">
<meta property="og:type" content="website">
<meta property="og:title" content="行程集錦 — 旅遊回憶 & 攻略">
<meta property="og:description" content="收藏走過的旅程,也能分享給朋友的攻略牆。每趟旅程含地圖、每日行程、景點與美食指南。">
<meta property="og:url" content="https://nctuwanglin.github.io/travel-journal/">
<meta property="og:image" content="https://nctuwanglin.github.io/travel-journal/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34"><rect x="2" y="7" width="30" height="5.5" rx="2.75" fill="%230e7c5a"/><rect x="2" y="14.5" width="30" height="5.5" rx="2.75" fill="%23c8344a"/><rect x="2" y="22" width="19" height="5.5" rx="2.75" fill="%2316191d"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --paper:#ece7dc;        /* 和紙底 — 刻意偏冷,避開通用米色 */
    --paper-2:#f6f2e9;      /* 卡片表面 */
    --ink:#16191d;
    --ink-soft:#454b54;
    --muted:#6e6557;      /* 由 #857d6d 加深:對紙底對比 4.65:1,過 WCAG AA */
    --faint:#8a8171;
    --line:#dcd5c5;
    --line-soft:#e6e0d2;
    --hayabusa:#0e7c5a;     /* E5 はやぶさ 常磐綠 */
    --hayabusa-soft:#e1efe7;
    --komachi:#c8344a;      /* E6 こまち 茜紅 */
    --komachi-soft:#f6e2e4;
    --tazawa:#163e73;       /* 田澤湖深藍 */
    --peach:#dd8a45;        /* 福島水蜜桃 暖金 */
    --peach-soft:#f6e9d6;
    --shadow:0 1px 2px rgba(22,25,29,.04),0 14px 40px -22px rgba(22,25,29,.45);
    --shadow-lg:0 2px 4px rgba(22,25,29,.05),0 28px 70px -30px rgba(22,25,29,.5);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{
    font-family:"Noto Sans TC",system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  a{color:inherit}
  .mono{font-family:"JetBrains Mono",monospace}
  .serif{font-family:"Noto Serif TC",serif}

  /* paper texture — faint grain */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background-image:radial-gradient(rgba(133,125,109,.06) 1px,transparent 1px);
    background-size:4px 4px;
  }
  #app{position:relative;z-index:1}

  /* ---------- eyebrow / labels ---------- */
  .eyebrow{
    font-family:"JetBrains Mono",monospace;font-weight:700;
    font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);
  }

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:700;
    background:rgba(236,231,220,.86);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  /* height 用 min-height:即使極窄螢幕文字被迫換行,topbar 也只是變高,不會裁切內容 */
  .topbar-in{display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:58px;flex-wrap:wrap;padding:6px 0}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer;text-decoration:none;min-width:0;flex:0 1 auto}
  .brand-mark{position:relative;width:34px;height:34px;flex:0 0 auto}
  .brand-mark i{position:absolute;height:4px;border-radius:2px;left:2px;right:2px}
  .brand-mark i:nth-child(1){top:9px;background:var(--hayabusa)}
  .brand-mark i:nth-child(2){top:16px;background:var(--komachi)}
  .brand-mark i:nth-child(3){top:23px;background:var(--ink);right:11px}
  .brand-name{font-family:"Noto Serif TC",serif;font-weight:900;font-size:17px;letter-spacing:.02em;white-space:nowrap}
  .brand-sub{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);white-space:nowrap}
  .topbar-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .btn{
    cursor:pointer;border:1px solid var(--line);background:var(--paper-2);
    color:var(--ink);font-family:inherit;font-size:13px;font-weight:700;
    padding:8px 15px;border-radius:9px;transition:.16s;display:inline-flex;align-items:center;gap:7px;
    text-decoration:none;white-space:nowrap;
  }
  .btn:hover{border-color:var(--ink);transform:translateY(-1px)}
  .btn-ink{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .btn-ink:hover{background:#000}
  .btn-ghost{background:transparent}
  /* 行動版:行程頁雙按鈕(← 集錦牆 + 下載旅遊書)較窄螢幕會擠壓品牌區,
     縮小按鈕與副標字距、隱藏副標避免換行擠爆 logo 文字 */
  @media(max-width:480px){
    .brand-sub{display:none}
    .btn{padding:7px 11px;font-size:12px;gap:5px}
  }

  /* =========================================================
     GALLERY / WALL
  ========================================================= */
  .hero{padding:34px 0 22px;position:relative;overflow:hidden}
  .hero-eye{display:flex;align-items:center;gap:14px;margin-bottom:20px}
  .hero-eye .rail{height:2px;width:54px;background:linear-gradient(90deg,var(--hayabusa),var(--komachi));border-radius:2px}
  .hero h1{
    font-family:"Noto Serif TC",serif;font-weight:900;
    font-size:clamp(40px,8.4vw,82px);line-height:1.02;letter-spacing:.01em;
  }
  .hero h1 .ja{display:block;color:var(--muted);font-size:clamp(15px,3.4vw,22px);font-weight:700;letter-spacing:.32em;margin-bottom:12px}
  .hero h1 em{font-style:normal;color:var(--hayabusa)}
  .hero-lead{margin-top:22px;max-width:540px;color:var(--ink-soft);font-size:16px}
  .hero-meta{display:flex;gap:30px;margin-top:26px;flex-wrap:wrap}
  .hero-meta .num{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:30px;line-height:1}
  .hero-meta .lbl{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  /* 旅遊足跡地圖(hero) */
  .footmap{margin-top:24px;height:380px;border:1px solid var(--line);border-radius:16px;
    overflow:hidden;box-shadow:var(--shadow)}
  .footmap .leaflet-container{height:100%;width:100%;background:#dfe5e2;font-family:inherit}
  .fmk{background:none;border:none}
  .fmk .fmk-in{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;
    background:var(--komachi);border:2px solid #fff;color:#fff;
    font-family:"Space Grotesk",sans-serif;font-size:11px;font-weight:700;box-shadow:0 1px 5px rgba(0,0,0,.3)}
  .fmk .fmk-in:empty{width:14px;height:14px;margin:3px}
  .fpop a{display:block;font-weight:700;color:var(--tazawa);text-decoration:none;padding:2.5px 0;font-size:13px}
  .fpop a:hover{text-decoration:underline}
  @media(max-width:620px){.footmap{height:300px}}

  /* filter chips */
  .filter{position:sticky;top:58px;z-index:699;background:rgba(236,231,220,.82);backdrop-filter:blur(10px);
    border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line);padding:13px 0}
  .filter-in{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:1px}
  .filter-in::-webkit-scrollbar{display:none}
  .filter-top{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
  .fsearch{flex:1 1 220px;min-width:150px;padding:8px 15px;border-radius:999px;border:1px solid var(--line);
    background:var(--paper-2);font-family:inherit;font-size:13px;color:var(--ink)}
  .fsearch::placeholder{color:var(--faint)}
  .fsearch:focus{outline:none;border-color:var(--hayabusa);box-shadow:0 0 0 2px var(--hayabusa-soft)}
  .fsel{padding:8px 30px 8px 12px;border-radius:999px;border:1px solid var(--line);background:var(--paper-2);
    font-family:inherit;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;
    -webkit-appearance:none;appearance:none;
    background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6"><path d="M1 1l4 4 4-4" stroke="%23857d6d" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>');
    background-repeat:no-repeat;background-position:right 12px center}
  .fsel:focus{outline:none;border-color:var(--hayabusa)}
  .fcount{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.08em;white-space:nowrap;margin-left:auto}
  .vtoggle{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--paper-2);flex:0 0 auto}
  .vtoggle button{border:none;background:transparent;padding:8px 13px;font-family:inherit;font-size:13px;font-weight:700;
    color:var(--muted);cursor:pointer;transition:.15s}
  .vtoggle button.on{background:var(--ink);color:var(--paper)}
  @media(max-width:620px){.fsearch{font-size:16px}} /* iOS 聚焦不自動縮放 */

  /* 時間軸檢視 */
  .grid.as-tl{display:block}
  .tl-yhead{display:flex;align-items:baseline;gap:14px;margin:6px 0 14px}
  .tl-yhead+.tl-item~.tl-yhead{margin-top:34px}
  .tl-y{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:38px;line-height:1}
  .tl-count{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);letter-spacing:.1em}
  .tl-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--paper-2);
    border:1px solid var(--line);border-radius:12px;margin-bottom:10px;text-decoration:none;
    transition:transform .15s,border-color .15s,box-shadow .15s}
  .tl-item:hover{transform:translateX(4px);border-color:var(--faint);box-shadow:var(--shadow)}
  .tl-dot{width:10px;height:10px;border-radius:50%;background:var(--faint);flex:0 0 auto}
  .tl-dot.up{background:var(--hayabusa);box-shadow:0 0 0 3px var(--hayabusa-soft)}
  .tl-date{font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;color:var(--komachi);min-width:84px;flex:0 0 auto}
  .tl-flag{font-size:16px;flex:0 0 auto}
  .tl-title{font-family:"Noto Serif TC",serif;font-weight:700;font-size:16.5px;white-space:nowrap}
  .tl-tag{color:var(--muted);font-size:12.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tl-go{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);flex:0 0 auto}
  .tl-item:hover .tl-go{color:var(--komachi)}
  .tl-year-gap{margin-top:36px}
  @media(max-width:620px){
    .tl-item{flex-wrap:wrap;gap:8px 10px}
    .tl-tag{flex-basis:100%;order:9;white-space:normal}
    .tl-title{white-space:normal}
  }
  .chip{flex:0 0 auto;cursor:pointer;border:1px solid var(--line);background:var(--paper-2);color:var(--muted);
    padding:7px 15px;border-radius:999px;font-size:13px;font-weight:700;white-space:nowrap;transition:.16s;user-select:none}
  .chip:hover{border-color:var(--ink);color:var(--ink)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip:focus-visible,.btn:focus-visible,.vtoggle button:focus-visible,.fsel:focus-visible,.tl-item:focus-visible{
    outline:3px solid var(--hayabusa);outline-offset:2px}

  /* grid */
  .grid{display:grid;gap:24px;padding:34px 0 70px;grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}
  @media(max-width:620px){.grid{grid-template-columns:1fr;gap:18px;padding:24px 0 50px}}

  .card{position:relative;background:var(--paper-2);border:1px solid var(--line);border-radius:18px;
    overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .22s,box-shadow .22s,border-color .22s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--faint)}
  .card:focus-visible{outline:3px solid var(--hayabusa);outline-offset:3px}
  .card-map{height:172px;position:relative;background:#dfe5e2;border-bottom:1px solid var(--line)}
  .card-map .leaflet-container{height:100%;width:100%;background:#dfe5e2}
  .card-mapband{position:absolute;left:0;right:0;bottom:0;height:54px;z-index:500;pointer-events:none;
    background:linear-gradient(to top,rgba(22,25,29,.5),transparent)}
  .card-badges{position:absolute;top:12px;left:12px;right:12px;z-index:600;display:flex;justify-content:space-between;gap:8px;pointer-events:none}
  .badge{font-family:"JetBrains Mono",monospace;font-size:10.5px;font-weight:700;letter-spacing:.08em;
    padding:5px 10px;border-radius:7px;backdrop-filter:blur(4px)}
  .badge-status{background:rgba(255,255,255,.9);color:var(--ink);border:1px solid var(--line)}
  .card-loc{position:absolute;left:14px;bottom:11px;z-index:600;color:#fff;pointer-events:none;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.18em;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .card-body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:11px;flex:1}
  .card-title{font-family:"Noto Serif TC",serif;font-weight:900;font-size:25px;line-height:1.16;letter-spacing:.01em}
  .card-sub{color:var(--muted);font-size:13.5px;margin-top:-5px}
  .card-date{display:flex;align-items:baseline;gap:9px}
  .card-date .d{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:18px}
  .card-date .y{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}
  .card-tag{color:var(--ink-soft);font-size:13.5px;line-height:1.5}
  .card-themes{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
  .tg{font-size:11.5px;font-weight:700;color:var(--hayabusa);background:var(--hayabusa-soft);
    padding:3px 9px;border-radius:6px}
  .card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:13px;border-top:1px solid var(--line-soft)}
  .card-blog{font-size:12.5px;font-weight:700;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
  .card-go{font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
  .card:hover .card-go{color:var(--komachi)}

  /* =========================================================
     TRIP DETAIL
  ========================================================= */
  .trip{padding:0 0 80px;animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .cover{padding:46px 0 30px;position:relative}
  .back{display:inline-flex;align-items:center;gap:7px;font-family:"JetBrains Mono",monospace;font-size:12px;
    font-weight:700;color:var(--muted);text-decoration:none;margin-bottom:26px;letter-spacing:.06em}
  .back:hover{color:var(--ink)}
  .cover-eye{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .cover h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(38px,7.6vw,72px);line-height:1.02}
  .cover .sub{font-size:clamp(16px,3vw,21px);color:var(--muted);margin-top:8px;letter-spacing:.04em}
  .cover-tag{margin-top:18px;font-size:16px;color:var(--ink-soft);max-width:600px}

  /* quick facts strip */
  .facts{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:34px 0 8px;
    border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--paper-2)}
  .fact{padding:18px 20px;border-right:1px solid var(--line-soft)}
  .fact:last-child{border-right:none}
  .fact .k{display:flex;align-items:center;gap:7px;font-family:"JetBrains Mono",monospace;font-size:10.5px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .fact .v{font-weight:700;font-size:15px;line-height:1.45}
  .fact .v small{display:block;font-weight:500;font-size:12.5px;color:var(--muted);margin-top:3px}
  @media(max-width:680px){.facts{grid-template-columns:1fr}.fact{border-right:none;border-bottom:1px solid var(--line-soft)}.fact:last-child{border-bottom:none}}

  /* section frame */
  .section{padding:44px 0 0}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:22px}
  .sec-no{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15px;color:var(--komachi)}
  .sec-title{font-family:"Noto Serif TC",serif;font-weight:900;font-size:26px;letter-spacing:.02em}
  .sec-line{flex:1;height:1px;background:var(--line);align-self:center}

  /* overview table */
  .otable{width:100%;border-collapse:collapse;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .otable th{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);text-align:left;padding:13px 18px;background:#efe9dd;font-weight:700}
  .otable td{padding:14px 18px;border-top:1px solid var(--line-soft);font-size:14.5px;vertical-align:top}
  .otable tr:hover td{background:rgba(255,255,255,.4)}
  .otable .dcell{white-space:nowrap}
  .otable .dcell b{font-family:"Space Grotesk",sans-serif;font-size:15px}
  .otable .theme{font-weight:700}
  .otable .stars{color:var(--peach);white-space:nowrap;font-size:13px}

  /* info cards (flight/stay/pass) */
  .infogrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:680px){.infogrid{grid-template-columns:1fr}}
  .infocard{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:20px}
  .infocard h3{font-family:"Noto Serif TC",serif;font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .irow{display:flex;gap:12px;padding:7px 0;font-size:14px;border-top:1px dashed var(--line-soft)}
  .irow:first-of-type{border-top:none}
  .irow .ik{color:var(--muted);flex:0 0 64px;font-size:12.5px;padding-top:1px}
  .irow .iv{flex:1}
  .stay-item{padding:11px 0;border-top:1px dashed var(--line-soft)}
  .stay-item:first-child{border-top:none}
  .stay-item .sn{font-weight:700}
  .stay-item .sm{font-size:12.5px;color:var(--muted);margin-top:2px}
  .rate{color:var(--peach);font-weight:700;font-family:"Space Grotesk",sans-serif}

  /* ---- DAY RAIL (signature) ---- */
  .days{position:relative;margin-top:6px}
  .day{position:relative;padding:0 0 8px 0}
  .day-head{display:flex;align-items:center;gap:16px;margin-bottom:4px}
  .day-no{flex:0 0 auto;width:62px;text-align:center}
  .day-no .n{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:34px;line-height:.9;color:var(--ink)}
  .day-no .l{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
  .day-head .meta{flex:1}
  .day-head .dt{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--komachi);font-weight:700;letter-spacing:.08em}
  .day-head .th{font-family:"Noto Serif TC",serif;font-weight:700;font-size:20px;line-height:1.25;margin-top:2px}
  .day-body{margin-left:30px;padding:14px 0 26px 32px;border-left:2px solid var(--hayabusa);position:relative}
  .day:last-child .day-body{border-image:linear-gradient(var(--hayabusa),transparent) 1}
  .day.couple .day-body{border-left-color:transparent;
    border-image:linear-gradient(var(--hayabusa) 0 50%,var(--komachi) 50% 100%) 1}
  .stop{position:relative;padding:0 0 16px 4px}
  .stop:last-child{padding-bottom:0}
  .stop::before{content:"";position:absolute;left:-39px;top:5px;width:11px;height:11px;border-radius:50%;
    background:var(--paper);border:2.5px solid var(--hayabusa);z-index:2}
  .day.couple .stop::before{border-color:var(--komachi)}
  .stop .t{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;color:var(--hayabusa);letter-spacing:.02em}
  .day.couple .stop .t{color:var(--komachi)}
  .stop .x{font-size:14.5px;color:var(--ink-soft);margin-top:1px;line-height:1.55}
  .tip{margin:6px 0 0 32px;padding:13px 16px;border-radius:11px;font-size:13.5px;display:flex;gap:11px;align-items:flex-start}
  .tip.info{background:var(--hayabusa-soft);color:#0c5c43}
  .tip.warn{background:var(--komachi-soft);color:#9a2638}
  .tip .ti{font-weight:700;flex:0 0 auto}

  /* spots */
  .spots{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.spots{grid-template-columns:1fr}}
  .spot{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:20px;position:relative;
    transition:border-color .18s,box-shadow .18s}
  .spot.hot{border-color:var(--komachi);box-shadow:0 0 0 2px var(--komachi-soft)}
  .spot h3{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .spot-no{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:50%;
    background:var(--komachi);color:#fff;font-family:"Space Grotesk",sans-serif;font-size:12.5px;font-weight:700;flex:0 0 auto}
  .spot-daytag{font-family:"Space Grotesk",sans-serif;font-size:11px;font-weight:700;color:#fff;
    padding:2.5px 9px;border-radius:6px;letter-spacing:.02em}
  .spot .area{font-size:12px;font-weight:700;color:var(--tazawa);background:#e4ebf3;padding:2px 8px;border-radius:6px}
  .spot .meta{display:flex;gap:14px;flex-wrap:wrap;margin:9px 0 11px;font-size:12px;color:var(--muted);font-family:"JetBrains Mono",monospace}
  .spot .meta b{color:var(--peach)}
  .spot .desc{font-size:14px;color:var(--ink-soft);line-height:1.65}
  .spot-ref,.food-ref{display:inline-flex;align-items:center;gap:5px;font-weight:700;color:var(--tazawa);text-decoration:none}
  .spot-ref{margin-top:14px;font-size:12.5px;border-bottom:1.5px solid transparent;transition:border-color .15s}
  .spot-ref:hover{border-bottom-color:var(--tazawa)}
  .food-ref{font-size:12px;white-space:nowrap}
  .food-ref:hover{text-decoration:underline}
  .food-ref.empty{color:var(--faint);font-weight:500}

  /* utility lists */
  .ucols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.ucols{grid-template-columns:1fr}}
  .ucard{background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:20px}
  .ucard h3{font-family:"Noto Serif TC",serif;font-size:17px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px}
  .ulist{list-style:none;display:flex;flex-direction:column;gap:9px}
  .ulist li{font-size:13.5px;color:var(--ink-soft);padding-left:18px;position:relative;line-height:1.5}
  .ulist li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--hayabusa)}
  .budget-row{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-top:1px dashed var(--line-soft);font-size:13.5px}
  .budget-row:first-child{border-top:none}
  .budget-row.total{border-top:2px solid var(--ink);margin-top:3px;font-weight:700}
  .budget-row .c{font-family:"Space Grotesk",sans-serif;font-weight:700;white-space:nowrap}

  /* detail map — 編號標記(與「景點介紹」卡片對應) */
  .nmk{background:none;border:none}
  .nmk .nmk-in{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;
    background:var(--komachi);border:2px solid #fff;color:#fff;
    font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:700;
    box-shadow:0 1px 5px rgba(0,0,0,.35);transition:transform .15s,background .15s}
  .nmk .nmk-in.hot{transform:scale(1.35);box-shadow:0 0 0 3px rgba(22,25,29,.3),0 1px 5px rgba(0,0,0,.35)}
  .maplegend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .lgd{display:inline-flex;align-items:center;gap:6px;font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:700;
    color:var(--ink-soft);background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:4px 11px;
    cursor:pointer;transition:.15s}
  .lgd:hover{border-color:var(--ink);color:var(--ink)}
  .lgd.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .lgd:focus-visible{outline:3px solid var(--hayabusa);outline-offset:2px}
  .lgd i{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
  .detailmap{height:420px;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow)}
  .detailmap .leaflet-container{height:100%;width:100%;background:#dfe5e2;font-family:inherit}
  .map-cap{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.06em}

  .footer{padding:40px 0;text-align:center;color:var(--faint);font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.1em}

  /* print-only */
  .print-only{display:none}
  .print-cover-map{position:relative;overflow:hidden;border:1px solid #ccc;border-radius:4px;margin:16px auto 0;max-width:100%}

  /* =========================================================
     PRINT — 旅遊書
  ========================================================= */
  @media print{
    @page{size:A4;margin:15mm 14mm}
    body{background:#fff;color:#000;font-size:11pt}
    body::before{display:none}
    .topbar,.filter,.footer,.back,.detailmap,.map-cap,.no-print{display:none !important}
    .wrap{max-width:none;padding:0}
    .trip{padding:0;animation:none}
    .cover{padding:0 0 8mm}
    .print-only{display:block}
    .section{padding:7mm 0 0;break-inside:avoid}
    .sec-head{margin-bottom:4mm}
    .day{break-inside:avoid}
    .day-body{break-inside:avoid}
    .spots,.ucols,.infogrid{break-inside:avoid}
    .spot,.ucard,.infocard{break-inside:avoid;box-shadow:none}
    .facts{break-inside:avoid}
    .card,.infocard,.spot,.ucard,.otable,.facts,.infogrid>*{box-shadow:none !important}
    a{text-decoration:none}
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.2/dist/html2pdf.bundle.min.js"
        integrity="sha384-aBc0BOllaGWrQx51DYt978St/L7B+21jzNGc4N/jnGD0NxGwj8S/ftRgW0AkXIak" crossorigin="anonymous"></script>
<script src="data/trips.js"></script>
<script>
(function(){
  "use strict";
  var TRIPS = window.TRIPS || [];
  var app = document.getElementById("app");
  var liveMaps = [];   // {m,kind} 追蹤 Leaflet 實例;kind: "page"(hero/詳情) 或 "card"(集錦卡片)

  var FLAGS = { "日本": "🇯🇵", "韓國": "🇰🇷", "越南": "🇻🇳", "中國": "🇨🇳" };
  function flagOf(c){ return FLAGS[c] || "🏳️"; }
  // 卡片標題:國家 地區 年份
  function displayTitle(t){ return t.country + " " + t.region + " " + t.year; }
  // 狀態隨現實日期自動更新:行程結束日一過,自動從「即將出發」變「旅遊回憶」
  var TODAY = (function(){ var d=new Date(); return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); })();
  function tripStatus(t){
    if(t.dateEnd && t.dateEnd < TODAY) return "旅遊回憶";
    if(t.dateStart && t.dateStart > TODAY) return "即將出發";
    if(t.dateStart && t.dateEnd) return "旅行中";
    return t.status || "旅遊回憶";
  }
  function isUpcoming(t){ var s=tripStatus(t); return s==="即將出發"||s==="旅行中"; }
  // 排序:即將出發置頂(越接近出發日越靠前),其餘旅遊回憶依日期由新到舊
  function tripSort(a,b){
    var au = isUpcoming(a), bu = isUpcoming(b);
    if(au !== bu) return au ? -1 : 1;
    var da = a.dateStart || "", db = b.dateStart || "";
    if(au) return da < db ? -1 : (da > db ? 1 : 0);
    return da < db ? 1 : (da > db ? -1 : 0);
  }

  /* ---------- helpers ---------- */
  function el(html){var t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstChild;}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function stars(n){var s="";for(var i=0;i<5;i++)s+=i<n?"★":"☆";return s;}
  function byId(id){for(var i=0;i<TRIPS.length;i++)if(TRIPS[i].id===id)return TRIPS[i];return null;}
  /* 每日代表色(路線地圖標記/景點卡/封面地圖共用) */
  var DAY_COLORS=["#0e7c5a","#c8344a","#163e73","#dd8a45","#7059a5","#1e8ea5","#9a5b2f","#5f7d2c","#b03a7e"];
  function dayColor(d){return DAY_COLORS[(d-1)%DAY_COLORS.length];}
  function addMap(m,kind){liveMaps.push({m:m,kind:kind||"page"});}
  function destroyMaps(kind){ // 不帶參數 = 全部銷毀;帶 kind 只銷毀該類(篩選重繪不動 hero 地圖)
    liveMaps=liveMaps.filter(function(e){
      if(kind&&e.kind!==kind)return true;
      try{e.m.remove();}catch(x){}
      return false;
    });
  }

  /* 靜態地圖(列印/PDF 用):直接以 CARTO 圖磚拼圖 + 疊景點紅點。
     CARTO 圖磚有 CORS 標頭,html2canvas 也能擷取(舊用的 staticmap.openstreetmap.de 已停止服務)。 */
  function staticMapHTML(trip,w,h){
    var z=trip.mapZoom, n=Math.pow(2,z);
    function lng2x(lng){return (lng+180)/360*n;}
    function lat2y(lat){var r=lat*Math.PI/180;return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*n;}
    var px0=lng2x(trip.mapCenter[1])*256-w/2, py0=lat2y(trip.mapCenter[0])*256-h/2;
    var html="";
    for(var ty=Math.floor(py0/256);ty<=Math.floor((py0+h)/256);ty++){
      if(ty<0||ty>=n)continue;
      for(var tx=Math.floor(px0/256);tx<=Math.floor((px0+w)/256);tx++){
        var wx=((tx%n)+n)%n;
        html+='<img crossorigin="anonymous" alt="" src="https://'+["a","b","c"][(tx+ty)%3]+'.basemaps.cartocdn.com/light_all/'+z+'/'+wx+'/'+ty+'.png"'+
              ' style="position:absolute;left:'+(tx*256-px0)+'px;top:'+(ty*256-py0)+'px;width:256px;height:256px">';
      }
    }
    (trip.spots||[]).forEach(function(s){
      var mx=lng2x(s.latlng[1])*256-px0, my=lat2y(s.latlng[0])*256-py0;
      if(mx<-8||my<-8||mx>w+8||my>h+8)return;
      html+='<span style="position:absolute;left:'+(mx-6)+'px;top:'+(my-6)+'px;width:12px;height:12px;border-radius:50%;'+
            'background:'+(s.day?dayColor(s.day):"#c8344a")+';border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.2)"></span>';
    });
    return '<div class="print-only print-cover-map" style="width:'+w+'px;height:'+h+'px">'+html+'</div>';
  }

  /* ---------- ROUTER ---------- */
  function route(){
    destroyMaps();
    var h=location.hash.replace(/^#/,"");
    var m=h.match(/^\/trip\/(.+)$/);
    if(m){var trip=byId(decodeURIComponent(m[1]));if(trip){renderTrip(trip);window.scrollTo(0,0);return;}}
    renderGallery();
  }
  window.addEventListener("hashchange",route);

  /* ---------- GALLERY ---------- */
  var activeFilter="全部", fYear="全部", fTheme="全部", fStatus="全部", fQuery="", viewMode="cards";
  function renderGallery(){
    document.title="行程集錦 — 旅遊回憶 & 攻略";
    var trips=TRIPS.slice();
    var countries=[]; trips.forEach(function(t){if(countries.indexOf(t.country)<0)countries.push(t.country);});
    var countBy={}; trips.forEach(function(t){countBy[t.country]=(countBy[t.country]||0)+1;});
    var totDays=0, totSpots=0;
    trips.forEach(function(t){totDays+=(t.days||[]).length;totSpots+=(t.spots||[]).length;});
    var years=[]; trips.forEach(function(t){if(years.indexOf(t.year)<0)years.push(t.year);});
    years.sort(function(a,b){return b-a;});
    var themeCount={}; trips.forEach(function(t){(t.themes||[]).forEach(function(th){themeCount[th]=(themeCount[th]||0)+1;});});
    var themes=Object.keys(themeCount).sort(function(a,b){return themeCount[b]-themeCount[a];});
    var filters=["全部"].concat(countries);

    app.innerHTML=
      topbar(false,null)+
      '<header class="hero"><div class="wrap">'+
        '<div class="hero-eye"><span class="rail"></span><span class="eyebrow">Travel Journal ・ 行程集錦</span></div>'+
        '<h1><span class="ja">TRAVEL JOURNAL</span>走過的旅程，<em>收藏成冊</em></h1>'+
        '<p class="hero-lead">每趟旅程一張卡片：地圖、每日行程、景點與美食攻略。點進去看，或下載旅遊書帶著走。</p>'+
        '<div class="hero-meta">'+
          stat(trips.length,"趟旅程")+stat(countries.length,"個國家")+stat(totDays,"天在路上")+stat(totSpots,"個景點")+
        '</div>'+
        '<div class="footmap" id="foot-map" role="region" aria-label="旅遊足跡地圖"></div>'+
        '<div class="map-cap">旅遊足跡 ・ 數字 = 同區域行程數 ・ 點標記看行程並可直接前往</div>'+
      '</div></header>'+
      '<div class="filter"><div class="wrap">'+
        '<div class="filter-top">'+
          '<input id="fq" class="fsearch" type="search" aria-label="搜尋行程、景點、美食" placeholder="搜尋行程、景點、美食…" value="'+esc(fQuery)+'">'+
          '<select id="fyear" class="fsel" aria-label="依年份篩選"><option value="全部">全部年份</option>'+
            years.map(function(y){return '<option'+(String(y)===String(fYear)?' selected':'')+'>'+y+'</option>';}).join("")+'</select>'+
          '<select id="ftheme" class="fsel" aria-label="依主題篩選"><option value="全部">全部主題</option>'+
            themes.map(function(th){return '<option'+(th===fTheme?' selected':'')+'>'+esc(th)+'</option>';}).join("")+'</select>'+
          '<select id="fstatus" class="fsel" aria-label="依狀態篩選"><option value="全部">全部狀態</option>'+
            '<option'+(fStatus==="即將出發"?' selected':'')+'>即將出發</option>'+
            '<option'+(fStatus==="旅遊回憶"?' selected':'')+'>旅遊回憶</option></select>'+
          '<div class="vtoggle" id="vtoggle" role="group" aria-label="檢視方式">'+
            '<button data-v="cards"'+(viewMode==="cards"?' class="on"':'')+' aria-pressed="'+(viewMode==="cards")+'">▦ 卡片</button>'+
            '<button data-v="timeline"'+(viewMode==="timeline"?' class="on"':'')+' aria-pressed="'+(viewMode==="timeline")+'">≣ 時間軸</button>'+
          '</div>'+
          '<span class="fcount" id="fcount"></span>'+
        '</div>'+
        '<div class="filter-in" id="filters">'+
          filters.map(function(f){
            var label=(f==="全部")?"全部":(flagOf(f)+" "+f);
            return '<button class="chip'+(f===activeFilter?' on':'')+'" data-f="'+esc(f)+'">'+esc(label)+'</button>';
          }).join("")+
        '</div>'+
      '</div></div>'+
      '<main class="wrap"><div class="grid" id="grid"></div></main>'+
      footer();

    // 篩選事件:只重繪卡片格,不重建整頁(地圖不再全部砍掉重來)
    document.getElementById("filters").addEventListener("click",function(e){
      var b=e.target.closest(".chip");if(!b)return;
      activeFilter=b.getAttribute("data-f");
      document.querySelectorAll("#filters .chip").forEach(function(c){
        c.classList.toggle("on",c.getAttribute("data-f")===activeFilter);
      });
      paintCards();
    });
    document.getElementById("fq").addEventListener("input",function(){fQuery=this.value.trim();paintCards();});
    document.getElementById("fyear").addEventListener("change",function(){fYear=this.value;paintCards();});
    document.getElementById("ftheme").addEventListener("change",function(){fTheme=this.value;paintCards();});
    document.getElementById("fstatus").addEventListener("change",function(){fStatus=this.value;paintCards();});
    document.getElementById("vtoggle").addEventListener("click",function(e){
      var b=e.target.closest("button");if(!b)return;
      viewMode=b.getAttribute("data-v");
      document.querySelectorAll("#vtoggle button").forEach(function(x){
        var on=x.getAttribute("data-v")===viewMode;
        x.classList.toggle("on",on);
        x.setAttribute("aria-pressed",String(on));
      });
      paintCards();
    });
    buildFootMap();
    paintCards();
  }
  function stat(n,l){return '<div><div class="num">'+n+'</div><div class="lbl">'+l+'</div></div>';}

  function tripMatches(t){
    if(activeFilter!=="全部"&&t.country!==activeFilter)return false;
    if(fYear!=="全部"&&String(t.year)!==String(fYear))return false;
    if(fTheme!=="全部"&&(t.themes||[]).indexOf(fTheme)<0)return false;
    if(fStatus==="即將出發"&&!isUpcoming(t))return false;
    if(fStatus==="旅遊回憶"&&isUpcoming(t))return false;
    if(fQuery){
      var hay=[t.title,t.subtitle,t.country,t.region,t.year,t.tagline,(t.themes||[]).join(" "),
        (t.spots||[]).map(function(s){return s.name;}).join(" "),
        (t.food||[]).map(function(f){return f.name;}).join(" ")].join(" ").toLowerCase();
      if(hay.indexOf(fQuery.toLowerCase())<0)return false;
    }
    return true;
  }

  var cardObserver=null;
  function paintCards(){
    destroyMaps("card");
    if(cardObserver){cardObserver.disconnect();cardObserver=null;}
    var grid=document.getElementById("grid");
    var list=TRIPS.filter(tripMatches).slice().sort(tripSort);
    var fc=document.getElementById("fcount");
    if(fc)fc.textContent=list.length+" / "+TRIPS.length+" 趟";
    grid.innerHTML="";
    grid.classList.toggle("as-tl",viewMode==="timeline");
    if(!list.length){
      grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">'+
        '沒有符合條件的行程 — 換個關鍵字,或清除篩選再試。</div>';
      return;
    }
    if(viewMode==="timeline"){renderTimeline(list,grid);return;}
    // 地圖 lazy 初始化:卡片捲進視窗前不建 Leaflet、不抓圖磚
    if("IntersectionObserver" in window){
      cardObserver=new IntersectionObserver(function(entries){
        entries.forEach(function(en){
          if(!en.isIntersecting)return;
          cardObserver.unobserve(en.target);
          var t=byId(en.target.getAttribute("data-trip"));
          if(t)buildMiniMap(en.target,t);
        });
      },{rootMargin:"280px"});
    }
    list.forEach(function(t){
      var card=el(
        '<a class="card" href="#/trip/'+encodeURIComponent(t.id)+'" tabindex="0" aria-label="'+esc(t.title)+'">'+
          '<div class="card-map" id="cm-'+esc(t.id)+'" aria-hidden="true">'+
            '<div class="card-badges">'+
              '<span></span>'+
              '<span class="badge badge-status">'+esc(tripStatus(t))+'</span>'+
            '</div>'+
            '<div class="card-mapband"></div>'+
            '<div class="card-loc">'+esc(t.country)+' / '+esc(t.region)+'</div>'+
          '</div>'+
          '<div class="card-body">'+
            '<div>'+
              '<div class="card-title">'+esc(displayTitle(t))+'</div>'+
              '<div class="card-sub">'+esc(t.subtitle||"")+'</div>'+
            '</div>'+
            '<div class="card-date"><span class="d">'+esc(t.dateLabel)+'</span><span class="y">'+esc(t.year)+'</span></div>'+
            '<div class="card-tag">'+esc(t.tagline||"")+'</div>'+
            '<div class="card-themes">'+(t.themes||[]).map(function(x){return '<span class="tg">'+esc(x)+'</span>';}).join("")+'</div>'+
            '<div class="card-foot">'+
              '<span class="card-blog">📍 '+((t.spots||[]).length)+' 個景點 ・ 🍽 '+((t.food||[]).length)+' 美食</span>'+
              '<span class="card-go">查看行程 →</span>'+
            '</div>'+
          '</div>'+
        '</a>'
      );
      grid.appendChild(card);
      var node=document.getElementById("cm-"+t.id);
      node.setAttribute("data-trip",t.id);
      if(cardObserver)cardObserver.observe(node);
      else buildMiniMap(node,t);
    });
  }

  /* 時間軸檢視:依年份分組(新→舊),行程列可點擊,尊重現有篩選 */
  function renderTimeline(list,grid){
    var sorted=list.slice().sort(function(a,b){
      var da=a.dateStart||"", db=b.dateStart||"";
      return da<db?1:(da>db?-1:0);
    });
    var byYear={}, years=[];
    sorted.forEach(function(t){
      if(!byYear[t.year]){byYear[t.year]=[];years.push(t.year);}
      byYear[t.year].push(t);
    });
    years.sort(function(a,b){return b-a;});
    grid.innerHTML=years.map(function(y,yi){
      return '<div class="tl-yhead'+(yi>0?' tl-year-gap':'')+'">'+
          '<span class="tl-y">'+y+'</span><span class="tl-count">'+byYear[y].length+' 趟</span><span class="sec-line"></span>'+
        '</div>'+
        byYear[y].map(function(t){
          return '<a class="tl-item" href="#/trip/'+encodeURIComponent(t.id)+'">'+
            '<span class="tl-dot'+(isUpcoming(t)?' up':'')+'"></span>'+
            '<span class="tl-date">'+esc(t.dateLabel||"")+'</span>'+
            '<span class="tl-flag">'+flagOf(t.country)+'</span>'+
            '<span class="tl-title">'+esc(displayTitle(t))+'</span>'+
            '<span class="tl-tag">'+esc(t.tagline||t.subtitle||"")+'</span>'+
            '<span class="tl-go">→</span>'+
          '</a>';
        }).join("");
    }).join("");
  }

  function buildMiniMap(node,trip){

  /* ---------- TRIP DETAIL ---------- */
  function renderTrip(t){
    document.title=displayTitle(t)+"｜行程集錦";
    var couplingDay=function(d){return !!d.couple;}; // 資料欄位 days[].couple: true → 雙色軌道日

    addSec("景點介紹",(t.spots&&t.spots.length)?spotsGrid(t):"");
    addSec((t.region||"")+"美食指南",(t.food&&t.food.length)?foodTable(t):"");
    addSec("實用旅遊資訊",utilCols(t));
    addSec("路線地圖",(t.spots&&t.spots.length)
      ? '<div class="detailmap" id="detail-map" role="region" aria-label="路線地圖"></div>'+dayLegend(t)+
        '<div class="map-cap">OpenStreetMap ・ 標記編號對應「景點介紹」・ 顏色 = 造訪日 ・ 點圖例可只看單日 ・ 點標記跳至該景點</div>'

          '<div class="cover-eye"><span class="eyebrow">'+esc(t.title)+'</span></div>'+
          '<h1>'+esc(displayTitle(t))+'</h1>'+
          '<div class="sub">'+esc(t.subtitle||"")+'</div>'+
          '<p class="cover-tag">'+esc(t.tagline||"")+'</p>'+
          staticMapHTML(t,680,250)+
          factsStrip(t)+

        secs.map(function(s,i){return sec(i+1,s[0],s[1]);}).join("")+

  function factsStrip(t){

    return '<div class="facts">'+
      fact("✈","航班",(t.flight&&t.flight.airline)||"-","<small>"+esc((t.flight&&t.flight.out)||"")+"</small>")+
      fact("🏨","住宿",esc(t.nights||"-")+" 晚","<small>"+esc(stay)+"</small>")+
      fact("🚄","交通",(t.pass&&t.pass.name)||"-","<small>"+esc((t.pass&&t.pass.price)||"")+"</small>")+

  function fact(ic,k,v,sub){return '<div class="fact"><div class="k">'+ic+' '+esc(k)+'</div><div class="v">'+v+(sub||"")+'</div></div>';}

  function overviewTable(t){
    var rows=(t.days||[]).map(function(d){
      return '<tr><td class="dcell"><b>'+esc(d.date)+'</b><br><span class="mono" style="font-size:11px;color:var(--muted)">Day '+d.day+'</span></td>'+
             '<td class="theme">'+esc(d.theme)+'</td></tr>';
    }).join("");

  function infoCards(t){
    var cards=[], p=t.pass||{};
    if(t.flight){
      var f=t.flight;
      cards.push('<div class="infocard"><h3>✈ 航班</h3>'+
        irow("航空",f.airline)+irow("去程",f.out)+irow("回程",f.back)+irow("備註",f.note)+'</div>');
    }
    if(t.stay&&t.stay.length){
      cards.push('<div class="infocard"><h3>🏨 住宿</h3>'+
        t.stay.map(function(s){return '<div class="stay-item"><div class="sn">'+esc(s.name)+
          (s.rating?' <span class="rate">★'+s.rating+'</span>':'')+'</div><div class="sm">'+esc(s.nights)+' ・ '+esc(s.note)+'</div></div>';}).join("")+'</div>');
    }
    if(p.rows&&p.rows.length){
      var head=p.head||["路段","車種","時間"];
      var passrows=p.rows.map(function(r){return '<tr>'+r.map(function(c,i){return '<td'+(i===2?' class="dcell mono" style="font-size:12px"':'')+'>'+esc(c)+'</td>';}).join("")+'</tr>';}).join("");
      cards.push('<div class="infocard" style="grid-column:1/-1"><h3>'+(p.icon||"🚄")+' '+esc(p.label||"交通票券")+' — '+esc(p.name||"")+' <span class="rate">'+esc(p.price||"")+'</span></h3>'+
        '<table class="otable" style="margin-top:6px"><thead><tr>'+head.map(function(h){return '<th>'+esc(h)+'</th>';}).join("")+'</tr></thead><tbody>'+passrows+'</tbody></table></div>');
    }

  function irow(k,v){if(!v)return"";return '<div class="irow"><span class="ik">'+esc(k)+'</span><span class="iv">'+esc(v)+'</span></div>';}

  function daysRail(t,isCouple){
    return '<div class="days">'+(t.days||[]).map(function(d){
      var couple=isCouple(d);
      var stops=(d.items||[]).map(function(i){
        return '<div class="stop"><div class="t">'+esc(i.time)+'</div><div class="x">'+esc(i.text)+'</div></div>';
      }).join("");
      var tips=d.tips||(d.tip?[d.tip]:[]);
      var tip=tips.map(function(tp){return '<div class="tip '+esc(tp.type)+'"><span class="ti">'+(tp.type==="warn"?"⚠️":"💡")+' '+esc(tp.title)+'</span><span>'+esc(tp.text)+'</span></div>';}).join("");
      return '<div class="day'+(couple?' couple':'')+'">'+
        '<div class="day-head">'+
          '<div class="day-no"><div class="n">'+d.day+'</div><div class="l">Day</div></div>'+
          '<div class="meta"><div class="dt">'+esc(d.date)+'</div><div class="th">'+esc(d.theme)+'</div></div>'+
        '</div>'+

  function dayLegend(t){
    var used=[];

    used.sort(function(a,b){return a-b;});
    // 圖例即篩選器:點「Day N」只看該日,點「全部」還原
    return '<div class="maplegend" id="maplegend" role="group" aria-label="路線地圖日次篩選">'+
      '<button class="lgd on" data-day="" aria-pressed="true">全部</button>'+
      used.map(function(d){
        var dd=null; (t.days||[]).forEach(function(x){if(x.day===d)dd=x;});
        return '<button class="lgd" data-day="'+d+'" aria-pressed="false">'+
          '<i style="background:'+dayColor(d)+'"></i>Day '+d+(dd?' ・ '+esc(dd.date):'')+'</button>';
      }).join("")+'</div>';

  function spotsGrid(t){
    return '<div class="spots">'+(t.spots||[]).map(function(s,i){
      var meta=[];

        (s.day?'<span class="spot-daytag" style="background:'+dayColor(s.day)+'">Day '+s.day+'</span>':'')+'</h3>'+
        '<div class="meta">'+meta.join("<span>·</span>")+'</div>'+

  function foodTable(t){

  function listCard(title,items){

  function utilCols(t){
    var cards=[];
    if(t.budget&&t.budget.length){
      cards.push('<div class="ucard"><h3>💴 預算估算</h3>'+t.budget.map(function(b){
        return '<div class="budget-row'+(b.total?' total':'')+'"><span>'+esc(b.item)+'</span><span class="c">'+esc(b.cost)+'</span></div>';
      }).join("")+'</div>');
    }
    if(t.apps&&t.apps.length)cards.push(listCard("📱 必備 App",t.apps));
    if(t.weather&&t.weather.length)cards.push(listCard("🌡️ 天氣",t.weather));
    if(t.notes&&t.notes.length)cards.push(listCard("⚠️ 注意事項",t.notes));
    (t.info||[]).forEach(function(c){cards.push(listCard(c.title,c.items));});
    if(!cards.length)return "";
    return '<div class="ucols">'+cards.join("")+'</div>';
  }

  /* 下載旅遊書:把行程內容渲染成 PDF 檔下載到裝置(不開列印對話框) */
  function downloadBook(t,btn){
    if(!window.html2pdf){alert("PDF 元件尚未載入完成,請稍候再試(需要網路)。");return;}
    var src=document.querySelector(".trip");if(!src)return;
    var clone=src.cloneNode(true);
    clone.classList.add("pdfbook");
    clone.style.animation="none";
    clone.style.background="#fff";
    // 移除互動地圖(canvas 無法擷取)與返回鍵;地圖整段移除
    clone.querySelectorAll(".back,.no-print").forEach(function(node){node.remove();});
    var mp=clone.querySelector("#detail-map");
    if(mp){var sec=mp.closest(".section");if(sec)sec.remove();}
    // PDF 專用版面:固定 A4 書頁寬度、攤平 grid、每個區塊不可被分頁切斷
    var st=document.createElement("style");
    st.textContent=
      ".pdfstage{position:fixed;inset:0;z-index:2147483647;background:#fff;overflow:auto;display:flex;justify-content:center;align-items:flex-start}"+
      ".pdfstage .pdfbook{width:794px;background:#fff}"+
      ".pdfstage .pdfbook .wrap{max-width:none !important;margin:0 !important;padding:0 28px !important}"+
      /* 用 .pdfbook 作用域:html2pdf 擷取時會把 clone 移入自己的容器,.pdfstage 後代選擇器會失效 */
      ".pdfbook .print-only{display:block}"+
      ".pdfbook .print-cover-map{break-inside:avoid;page-break-inside:avoid}"+
      ".pdfbook .spots,.pdfbook .ucols,.pdfbook .infogrid,.pdfbook .facts{display:block !important}"+
      ".pdfbook .fact{border-right:none !important;border-bottom:1px solid var(--line-soft)}"+
      ".pdfbook .spot,.pdfbook .ucard,.pdfbook .infocard{margin-bottom:12px}"+
      ".pdfbook .spot,.pdfbook .ucard,.pdfbook .infocard,.pdfbook .fact,.pdfbook .facts,"+
      ".pdfbook .day,.pdfbook .day-head,.pdfbook .day-body,.pdfbook .tip,.pdfbook .stop,"+
      ".pdfbook .otable,.pdfbook .otable tr,.pdfbook .sec-head,.pdfbook .cover"+
      "{break-inside:avoid;page-break-inside:avoid}"+
      ".pdfbook .section{break-inside:auto;page-break-inside:auto}";
    // 在畫面上(正座標)渲染,避免 html2canvas 把負位移烤進畫面造成左右被裁切
    var holder=document.createElement("div");
    holder.className="pdfstage";
    holder.appendChild(st);
    holder.appendChild(clone);
    document.body.appendChild(holder);
    var label=btn?btn.innerHTML:"";
    if(btn){btn.innerHTML="產生 PDF 中…";btn.disabled=true;}
    function done(){holder.remove();if(btn){btn.innerHTML=label;btn.disabled=false;}}
    var started=false;
    function runPdf(){
      if(started)return; started=true;
      window.html2pdf().set({
        margin:[10,8,12,8],
        filename:t.region+"_"+t.year+"_旅遊書.pdf",
        image:{type:"jpeg",quality:0.96},
        html2canvas:{scale:2,useCORS:true,backgroundColor:"#ffffff",scrollX:0,scrollY:0},
        jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
        pagebreak:{mode:["avoid-all","css","legacy"]}
      }).from(clone).save().then(done).catch(function(e){done();alert("PDF 產生失敗:"+e);});
    }
    // cloneNode 的 <img>(封面地圖圖磚)需重新載入,等載完再擷取,否則地圖是空白
    var pending=0;
    clone.querySelectorAll("img").forEach(function(im){
      if(im.complete&&im.naturalWidth>0)return;
      pending++;
      var fin=function(){if(--pending<=0)runPdf();};
      im.addEventListener("load",fin);
      im.addEventListener("error",fin);
    });
    if(pending===0)runPdf();
    else setTimeout(runPdf,8000); // 保險:圖磚逾時也照樣輸出
  }

  function buildDetailMap(t){
    var node=document.getElementById("detail-map");if(!node||!window.L)return;
    var map=L.map(node,{scrollWheelZoom:false}).setView(t.mapCenter,t.mapZoom);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
      maxZoom:18,attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);
    var pts=[], markers=[];
    (t.spots||[]).forEach(function(s,i){
      pts.push(s.latlng);
      var icon=L.divIcon({className:"nmk",
        html:'<span class="nmk-in"'+(s.day?' style="background:'+dayColor(s.day)+'"':'')+'>'+(i+1)+'</span>',
        iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-14]});
      var mk=L.marker(s.latlng,{icon:icon}).addTo(map)
        .bindPopup('<b>'+esc(s.name)+'</b><br>'+esc(s.area)+(s.day?' ・ Day '+s.day:'')+(s.rating?' ・ ★'+s.rating:''));
      markers.push(mk);
    });
    // 連動:景點卡 hover → 地圖標記放大變色;點地圖標記 → 捲動至對應景點卡
    function markerEl(mk){var e2=mk.getElement();return e2?e2.firstChild:null;}
    document.querySelectorAll(".spot[data-spot]").forEach(function(card){
      var mk=markers[+card.getAttribute("data-spot")];if(!mk)return;
      card.addEventListener("mouseenter",function(){var e2=markerEl(mk);if(e2)e2.classList.add("hot");});
      card.addEventListener("mouseleave",function(){var e2=markerEl(mk);if(e2)e2.classList.remove("hot");});
    });
    markers.forEach(function(mk,i){
      mk.on("click",function(){
        var card=document.querySelector('.spot[data-spot="'+i+'"]');if(!card)return;
        card.scrollIntoView({behavior:"smooth",block:"center"});
        card.classList.add("hot");
        setTimeout(function(){card.classList.remove("hot");},1600);
      });
    });
    // 圖例篩選:點 Day N 只顯示該日標記並 refit,點「全部」還原
    var legend=document.getElementById("maplegend");
    if(legend){
      legend.addEventListener("click",function(e){
        var b=e.target.closest(".lgd");if(!b)return;
        var sel=b.getAttribute("data-day");
        legend.querySelectorAll(".lgd").forEach(function(x){
          var on=(x===b);
          x.classList.toggle("on",on);
          x.setAttribute("aria-pressed",String(on));
        });
        var vis=[];
        (t.spots||[]).forEach(function(s,i){
          var mk=markers[i];if(!mk)return;
          if(!sel||String(s.day)===sel){mk.addTo(map);vis.push(s.latlng);}
          else map.removeLayer(mk);
        });
        if(vis.length>1){try{map.fitBounds(vis,{padding:[40,40]});}catch(e2){}}
        else if(vis.length===1)map.setView(vis[0],Math.max(t.mapZoom+1,9));
      });
    }
    if(pts.length>1){try{map.fitBounds(pts,{padding:[40,40]});}catch(e){}}
    addMap(map,"page");
    setTimeout(function(){map.invalidateSize();},120);
  }

  /* 旅遊足跡地圖(hero):全部行程標在同一張地圖,0.5° 網格聚合,點開列行程連結 */
  function buildFootMap(){
    var node=document.getElementById("foot-map");if(!node||!window.L)return;
    var map=L.map(node,{scrollWheelZoom:false}).setView([28,124],4);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
      maxZoom:18,attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);
    var groups={};
    TRIPS.forEach(function(t){
      var key=(Math.round(t.mapCenter[0]*2)/2)+","+(Math.round(t.mapCenter[1]*2)/2);
      (groups[key]=groups[key]||[]).push(t);
    });
    var pts=[];
    Object.keys(groups).forEach(function(k){
      var list=groups[k].slice().sort(tripSort);
      var c=list[0].mapCenter; pts.push(c);
      var icon=L.divIcon({className:"fmk",
        html:'<span class="fmk-in">'+(list.length>1?list.length:"")+'</span>',
        iconSize:[20,20],iconAnchor:[10,10],popupAnchor:[0,-10]});
      var html='<div class="fpop">'+list.map(function(t){
        return '<a href="#/trip/'+encodeURIComponent(t.id)+'">'+flagOf(t.country)+' '+esc(displayTitle(t))+'</a>';
      }).join("")+'</div>';
      L.marker(c,{icon:icon}).addTo(map).bindPopup(html);
    });
    if(pts.length>1){try{map.fitBounds(pts,{padding:[36,36]});}catch(e){}}
    addMap(map,"page");
    setTimeout(function(){map.invalidateSize();},120);
  }

  /* ---------- 瀏覽人數(counterapi.dev 免費計數,失敗時不顯示;本機開發不計) ---------- */
  var VISITS = null;
  var IS_LOCAL = location.protocol==="file:" || /^(localhost|127\.|0\.0\.0\.0|\[::1\])/.test(location.hostname);
  if(!IS_LOCAL)
  fetch("https://api.counterapi.dev/v1/nctuwanglin-travel-journal/pv/up")
    .then(function(r){ return r.json(); })
    .then(function(d){
      VISITS = (d && (d.count!=null ? d.count : (d.data&&d.data.count)))||null;
      var n=document.getElementById("visits");
      if(n && VISITS!=null) n.textContent = "・ 瀏覽 " + Number(VISITS).toLocaleString() + " 次";
    })
    .catch(function(){});
  function visitsHtml(){
    return '<span id="visits">'+(VISITS!=null ? "・ 瀏覽 "+Number(VISITS).toLocaleString()+" 次" : "")+'</span>';
  }
  function footer(){return '<footer class="footer">行程集錦 ・ TRAVEL JOURNAL ・ 收藏與分享每一趟旅程 '+visitsHtml()+'</footer>';}

  /* ---------- boot ---------- */
  if(!TRIPS.length){app.innerHTML='<div style="padding:80px;text-align:center;color:#857d6d">尚無行程資料 — 請確認 data/trips.js 已載入。</div>';}
  else route();
})();
</script>
</body>
</html>
